[databases]
# RW pool to current leader via HAProxy
app_rw = host=haproxy port=5000 dbname=postgres
# RO pool to replicas via HAProxy
app_ro = host=haproxy port=5001 dbname=postgres

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
listen_port_extra = 7432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 100
ignore_startup_parameters = extra_float_digits
admin_users = postgres
stats_users = postgres
