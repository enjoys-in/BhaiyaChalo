global
  log stdout format raw local0

defaults
  log global
  mode tcp
  option tcplog
  timeout connect 5s
  timeout client 60s
  timeout server 60s

# RW endpoint: forwards to current primary
frontend postgres_rw
  bind *:5000
  default_backend patroni_primary

# RO endpoint: forwards to any healthy replica (falls back if only one node)
frontend postgres_ro
  bind *:5001
  default_backend patroni_replicas

# Patroni REST health checks
frontend patroni_health
  bind *:7000
  default_backend patroni_api

backend patroni_primary
  option httpchk GET /primary
  http-check expect status 200
  server node1 patroni1:5432 check port 8008 inter 2s fall 3 rise 2
  server node2 patroni2:5432 check port 8008 inter 2s fall 3 rise 2

backend patroni_replicas
  option httpchk GET /replica
  http-check expect status 200
  server node1 patroni1:5432 check port 8008 inter 2s fall 3 rise 2
  server node2 patroni2:5432 check port 8008 inter 2s fall 3 rise 2

backend patroni_api
  option httpchk GET /health
  server node1 patroni1:8008 check
  server node2 patroni2:8008 check
