replicaCount: 2

image:
  repository: ghcr.io/enjoys-in/bhaiyachalo
  tag: latest
  pullPolicy: IfNotPresent

service:
  name: override-me
  port: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPU: 70

env: {}
