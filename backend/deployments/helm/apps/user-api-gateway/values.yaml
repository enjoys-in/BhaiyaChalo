replicaCount: 2

service:
  name: user-api-gateway
  port: 3002

image:
  repository: ghcr.io/enjoys-in/bhaiyachalo
  tag: latest

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 20
  targetCPU: 60

env:
  SERVICE_NAME: "user-api-gateway"
  PORT: "3002"
  LOG_LEVEL: "info"
