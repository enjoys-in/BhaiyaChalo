replicaCount: 2

service:
  name: delivery-ack-service
  port: 8306

image:
  repository: ghcr.io/enjoys-in/bhaiyachalo
  tag: latest

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPU: 70

env:
  SERVICE_NAME: "delivery-ack-service"
  PORT: "8306"
  LOG_LEVEL: "info"
