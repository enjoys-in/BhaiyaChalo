replicaCount: 2

service:
  name: realtime-metrics-service
  port: 9003

image:
  repository: ghcr.io/enjoys-in/bhaiyachalo
  tag: latest

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPU: 70

env:
  SERVICE_NAME: "realtime-metrics-service"
  PORT: "9003"
  LOG_LEVEL: "info"
