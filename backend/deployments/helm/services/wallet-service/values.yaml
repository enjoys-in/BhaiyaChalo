replicaCount: 2

service:
  name: wallet-service
  port: 8502

image:
  repository: ghcr.io/enjoys-in/bhaiyachalo
  tag: latest

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPU: 70

env:
  SERVICE_NAME: "wallet-service"
  PORT: "8502"
  LOG_LEVEL: "info"
