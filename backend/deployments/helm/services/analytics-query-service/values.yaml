replicaCount: 2

service:
  name: analytics-query-service
  port: 9002

image:
  repository: ghcr.io/enjoys-in/bhaiyachalo
  tag: latest

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPU: 70

env:
  SERVICE_NAME: "analytics-query-service"
  PORT: "9002"
  LOG_LEVEL: "info"
