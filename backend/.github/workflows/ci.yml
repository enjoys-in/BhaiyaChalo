name: CI - Build & Test Changed Services

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
      gateways: ${{ steps.changes.outputs.gateways }}
      libs: ${{ steps.changes.outputs.libs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            BASE=${{ github.event.before }}
          fi

          CHANGED=$(git diff --name-only "$BASE" HEAD)

          # Find changed services
          SERVICES=$(echo "$CHANGED" | grep -oP 'services/[^/]+/[^/]+' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"

          # Find changed gateways
          GATEWAYS=$(echo "$CHANGED" | grep -oP 'apps/[^/]+' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "gateways=$GATEWAYS" >> "$GITHUB_OUTPUT"

          # Check if libs changed
          LIBS=$(echo "$CHANGED" | grep -c '^libs/' || true)
          echo "libs=$LIBS" >> "$GITHUB_OUTPUT"

  build-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          go build ./...

      - name: Test ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          go test ./... -v -race -count=1

      - name: Vet ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          go vet ./...

  build-gateway:
    needs: detect-changes
    if: needs.detect-changes.outputs.gateways != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        gateway: ${{ fromJson(needs.detect-changes.outputs.gateways) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build ${{ matrix.gateway }}
        run: |
          cd ${{ matrix.gateway }}
          go build ./...

      - name: Test ${{ matrix.gateway }}
        run: |
          cd ${{ matrix.gateway }}
          go test ./... -v -race -count=1

  build-libs:
    needs: detect-changes
    if: needs.detect-changes.outputs.libs != '0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build all libs
        run: |
          for dir in libs/*/; do
            if [ -f "$dir/go.mod" ]; then
              echo "Building $dir"
              cd "$dir"
              go build ./...
              go test ./... -v -race -count=1
              cd -
            fi
          done
