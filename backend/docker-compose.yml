name: bhaiyachalo-local

services:
  postgres:
    image: postgres:18
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bhaiyachalo
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployments/local/postgres/init:/docker-entrypoint-initdb.d
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
      - -c
      - hot_standby=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - bhaiyachalo

  postgres-replica-1:
    image: postgres:18
    container_name: postgres-replica-1
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      PGPASSWORD: replicator_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_replica1_data:/var/lib/postgresql/data
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        if [ ! -s "$$PGDATA/PG_VERSION" ]; then
          mkdir -p "$$PGDATA"
          chmod 700 "$$PGDATA"
          pg_basebackup -h postgres -U replicator -D "$$PGDATA" -Fp -Xs -R -P
        fi
        exec postgres -c hot_standby=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - bhaiyachalo

  postgres-replica-2:
    image: postgres:18
    container_name: postgres-replica-2
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      PGPASSWORD: replicator_password
    ports:
      - "5434:5432"
    volumes:
      - postgres_replica2_data:/var/lib/postgresql/data
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        if [ ! -s "$$PGDATA/PG_VERSION" ]; then
          mkdir -p "$$PGDATA"
          chmod 700 "$$PGDATA"
          pg_basebackup -h postgres -U replicator -D "$$PGDATA" -Fp -Xs -R -P
        fi
        exec postgres -c hot_standby=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - bhaiyachalo

  pgbouncer-rw:
    image: edoburu/pgbouncer:1.23.1
    container_name: pgbouncer-rw
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bhaiyachalo
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 100
      ADMIN_USERS: postgres
      AUTH_TYPE: md5
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "6432:5432"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5432"]
      interval: 10s
      timeout: 3s
      retries: 20
    networks:
      - bhaiyachalo

  pgbouncer-ro:
    image: edoburu/pgbouncer:1.23.1
    container_name: pgbouncer-ro
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres-replica-1
      DB_PORT: 5432
      DB_NAME: bhaiyachalo
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 100
      ADMIN_USERS: postgres
      AUTH_TYPE: md5
    depends_on:
      postgres-replica-1:
        condition: service_healthy
    ports:
      - "7432:5432"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5432"]
      interval: 10s
      timeout: 3s
      retries: 20
    networks:
      - bhaiyachalo

  mongo:
    image: mongo:7
    container_name: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - bhaiyachalo

  valkey:
    image: valkey/valkey:7.2-alpine
    container_name: valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    command: ["valkey-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - bhaiyachalo

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - bhaiyachalo

  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      - bhaiyachalo

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_started
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8080:8080"
    networks:
      - bhaiyachalo

  adminer:
    image: adminer:4
    container_name: adminer
    depends_on:
      pgbouncer-rw:
        condition: service_healthy
    ports:
      - "8088:8080"
    networks:
      - bhaiyachalo

  # Placeholder app containers (enabled only with profile 'apps').
  # They exist to reserve service names and networking during early scaffolding.
  admin-api-gateway:
    image: alpine:3.20
    container_name: admin-api-gateway
    profiles: ["apps"]
    env_file:
      - ./apps/admin-api-gateway/.env
    command: ["sh", "-c", "sleep infinity"]
    volumes:
      - ./apps/admin-api-gateway:/workspace
    depends_on:
      pgbouncer-rw:
        condition: service_healthy
      kafka:
        condition: service_started
      valkey:
        condition: service_healthy
    networks:
      - bhaiyachalo

  user-api-gateway:
    image: alpine:3.20
    container_name: user-api-gateway
    profiles: ["apps"]
    env_file:
      - ./apps/user-api-gateway/.env
    command: ["sh", "-c", "sleep infinity"]
    volumes:
      - ./apps/user-api-gateway:/workspace
    depends_on:
      pgbouncer-rw:
        condition: service_healthy
      kafka:
        condition: service_started
      valkey:
        condition: service_healthy
    networks:
      - bhaiyachalo

  driver-api-gateway:
    image: alpine:3.20
    container_name: driver-api-gateway
    profiles: ["apps"]
    env_file:
      - ./apps/driver-api-gateway/.env
    command: ["sh", "-c", "sleep infinity"]
    volumes:
      - ./apps/driver-api-gateway:/workspace
    depends_on:
      pgbouncer-rw:
        condition: service_healthy
      kafka:
        condition: service_started
      valkey:
        condition: service_healthy
    networks:
      - bhaiyachalo

  phoenix-websocket-gateway:
    image: alpine:3.20
    container_name: phoenix-websocket-gateway
    profiles: ["apps"]
    env_file:
      - ./realtime/phoenix-websocket-gateway/.env
    command: ["sh", "-c", "sleep infinity"]
    volumes:
      - ./realtime/phoenix-websocket-gateway:/workspace
    depends_on:
      kafka:
        condition: service_started
      valkey:
        condition: service_healthy
    networks:
      - bhaiyachalo

volumes:
  postgres_data:
  postgres_replica1_data:
  postgres_replica2_data:
  mongo_data:
  valkey_data:
  clickhouse_data:
  kafka_data:

networks:
  bhaiyachalo:
    driver: bridge
